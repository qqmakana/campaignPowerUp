<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PowerUp & Win Logo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .logo {
            text-align: center;
            padding: 20px;
        }
        .power {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 3px 3px 0px #ffffff;
            margin-bottom: 10px;
        }
        .up-win {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .up-arrow {
            width: 60px;
            height: 40px;
            background: #ff4444;
            border: 2px solid #ffffff;
            position: relative;
            clip-path: polygon(0% 100%, 0% 0%, 80% 0%, 100% 50%, 80% 100%);
        }
        .up-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .power-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 12px;
            height: 12px;
            background: #3b82f6;
            border: 2px solid #ffffff;
            border-radius: 50%;
        }
        .ampersand, .win {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 2px 2px 0px #ffffff;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #ffffff;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="logo">
        <div class="power">POWER</div>
        <div class="up-win">
            <div class="up-arrow">
                <div class="up-text">UP</div>
                <div class="power-btn"></div>
            </div>
            <div class="ampersand">&</div>
            <div class="win">WIN</div>
        </div>
        <div class="subtitle">UMS Northern Division</div>
    </div>
</body>
</html>
