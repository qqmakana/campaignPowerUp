<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerUp & Win - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">PowerUp & Win</h1>
                    <p class="text-gray-600 mt-2">Admin Dashboard - Form Submissions</p>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-medium">
                        <span id="status-indicator">Loading...</span>
                    </div>
                    <button onclick="refreshData()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                        <i data-lucide="refresh-cw" class="w-4 h-4 inline mr-2"></i>
                        Refresh
                    </button>
                    <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors">
                        <i data-lucide="log-out" class="w-4 h-4 inline mr-2"></i>
                        Logout
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <div class="flex items-center">
                    <div class="bg-blue-100 p-3 rounded-full">
                        <i data-lucide="users" class="w-6 h-6 text-blue-600"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">Total Submissions</p>
                        <p class="text-2xl font-bold text-gray-900" id="total-submissions">-</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-lg p-6">
                <div class="flex items-center">
                    <div class="bg-green-100 p-3 rounded-full">
                        <i data-lucide="store" class="w-6 h-6 text-green-600"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">Retail Stores</p>
                        <p class="text-2xl font-bold text-gray-900" id="retail-count">-</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-lg p-6">
                <div class="flex items-center">
                    <div class="bg-purple-100 p-3 rounded-full">
                        <i data-lucide="building" class="w-6 h-6 text-purple-600"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">Wholesale Stores</p>
                        <p class="text-2xl font-bold text-gray-900" id="wholesale-count">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Submissions Table -->
        <div class="bg-white rounded-lg shadow-lg">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-xl font-semibold text-gray-900">Recent Submissions</h2>
            </div>
            
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Store</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Representative</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Submitted</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="submissions-table" class="bg-white divide-y divide-gray-200">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Export Section -->
        <div class="mt-8 bg-white rounded-lg shadow-lg p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Export Data</h3>
            <div class="flex space-x-4">
                <button onclick="exportToCSV()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition-colors">
                    <i data-lucide="download" class="w-4 h-4 inline mr-2"></i>
                    Export CSV
                </button>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'admin-secure.html';
        }

        // Initialize Lucide icons
        lucide.createIcons();

        // API Configuration
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:3001' 
            : 'https://api.powerupandwin.co.za';

        let submissions = [];

        // Load submissions from API
        async function loadSubmissions() {
            try {
                const response = await fetch(`${API_BASE}/api/submissions`);
                const data = await response.json();
                
                if (data.success) {
                    submissions = data.submissions;
                    updateStats();
                    renderTable();
                    updateStatus('Connected', 'green');
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                console.error('Failed to load submissions:', error);
                updateStatus('Connection Error', 'red');
                // Fallback to localStorage
                loadFromLocalStorage();
            }
        }

        // Fallback to localStorage
        function loadFromLocalStorage() {
            try {
                const localData = JSON.parse(localStorage.getItem('powerupWinSubmissions') || '[]');
                submissions = localData;
                updateStats();
                renderTable();
                updateStatus('Local Data', 'yellow');
            } catch (error) {
                console.error('Failed to load from localStorage:', error);
                updateStatus('No Data', 'red');
            }
        }

        // Update statistics
        function updateStats() {
            document.getElementById('total-submissions').textContent = submissions.length;
            
            const retailCount = submissions.filter(s => s.storeType === 'retail').length;
            const wholesaleCount = submissions.filter(s => s.storeType === 'wholesale').length;
            
            document.getElementById('retail-count').textContent = retailCount;
            document.getElementById('wholesale-count').textContent = wholesaleCount;
        }

        // Render submissions table
        function renderTable() {
            const tbody = document.getElementById('submissions-table');
            tbody.innerHTML = '';

            if (submissions.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-4 text-center text-gray-500">
                            No submissions found
                        </td>
                    </tr>
                `;
                return;
            }

            submissions.forEach(submission => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900">${submission.storeName || 'N/A'}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${submission.representativeName || 'N/A'}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${submission.email || 'N/A'}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${submission.phone || 'N/A'}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${
                            submission.storeType === 'retail' 
                                ? 'bg-green-100 text-green-800' 
                                : 'bg-purple-100 text-purple-800'
                        }">
                            ${submission.storeType || 'N/A'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${new Date(submission.submittedAt).toLocaleString()}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="viewSubmission('${submission.id}')" class="text-blue-600 hover:text-blue-900">
                            View Details
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // View submission details
        function viewSubmission(id) {
            const submission = submissions.find(s => s.id === id);
            if (submission) {
                alert(`Submission Details:\n\nStore: ${submission.storeName}\nRepresentative: ${submission.representativeName}\nEmail: ${submission.email}\nPhone: ${submission.phone}\nAddress: ${submission.address}\nType: ${submission.storeType}\nSubmitted: ${new Date(submission.submittedAt).toLocaleString()}`);
            }
        }

        // Export to CSV
        function exportToCSV() {
            if (submissions.length === 0) {
                alert('No data to export');
                return;
            }

            const headers = ['ID', 'Store Name', 'Representative', 'Email', 'Phone', 'Address', 'Store Type', 'Submitted At'];
            const csvContent = [
                headers.join(','),
                ...submissions.map(s => [
                    s.id,
                    `"${s.storeName || ''}"`,
                    `"${s.representativeName || ''}"`,
                    `"${s.email || ''}"`,
                    `"${s.phone || ''}"`,
                    `"${s.address || ''}"`,
                    s.storeType || '',
                    s.submittedAt
                ].join(','))
            ].join('\n');

            downloadFile(csvContent, 'powerup-win-submissions.csv', 'text/csv');
        }


        // Download file helper
        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Update status indicator
        function updateStatus(text, color) {
            const indicator = document.getElementById('status-indicator');
            indicator.textContent = text;
            indicator.className = `px-3 py-1 rounded-full text-sm font-medium ${
                color === 'green' ? 'bg-green-100 text-green-800' :
                color === 'red' ? 'bg-red-100 text-red-800' :
                'bg-yellow-100 text-yellow-800'
            }`;
        }

        // Refresh data
        function refreshData() {
            loadSubmissions();
        }

        // Logout function
        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminLoginTime');
            window.location.href = 'admin-secure.html';
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadSubmissions);
    </script>
</body>
</html>
