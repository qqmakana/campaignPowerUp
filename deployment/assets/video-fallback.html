<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #1a1a1a, #2d2d2d, #1a1a1a);
            background-size: 400% 400%;
            animation: gradientMove 8s ease infinite;
        }
        
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 10;
        }
        
        .logo {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(220, 38, 38, 1);
            animation: pulse 3s ease-in-out infinite;
            background: linear-gradient(45deg, #ef4444, #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .subtitle {
            font-size: 1.5rem;
            opacity: 0.9;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
        
        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .floating {
            position: absolute;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { 
                transform: translateY(0px) rotate(0deg) scale(1); 
                opacity: 0.6;
            }
            50% { 
                transform: translateY(-30px) rotate(180deg) scale(1.2); 
                opacity: 1;
            }
        }
        
        .floating:nth-child(1) { 
            top: 20%; left: 10%; 
            width: 60px; height: 60px;
            animation-delay: 0s; 
        }
        .floating:nth-child(2) { 
            top: 60%; right: 15%; 
            width: 40px; height: 40px;
            animation-delay: 2s; 
        }
        .floating:nth-child(3) { 
            bottom: 30%; left: 20%; 
            width: 80px; height: 80px;
            animation-delay: 4s; 
        }
        .floating:nth-child(4) { 
            top: 40%; right: 30%; 
            width: 50px; height: 50px;
            animation-delay: 1s; 
        }
        .floating:nth-child(5) { 
            top: 70%; left: 60%; 
            width: 70px; height: 70px;
            animation-delay: 3s; 
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="floating-elements">
            <div class="floating"></div>
            <div class="floating"></div>
            <div class="floating"></div>
            <div class="floating"></div>
            <div class="floating"></div>
        </div>
        
        <div class="content">
            <div class="logo">POWER UP & WIN</div>
            <div class="subtitle">UMS Northern Division</div>
        </div>
    </div>
</body>
</html>
